<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Call</title>
</head>
<body>
    <h2>Simple Audio Call</h2>
    <button id="start">Start Call</button>

    <audio id="remoteAudio" autoplay playsinline controls></audio>

<script>
const protocol = location.protocol === "https:" ? "wss://" : "ws://";
const ws = new WebSocket(protocol + location.host + "/ws");

let localStream;
let peer;
let isInitiator = false;
let isReady = false;
let started = false;

const configuration = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};

function log(...args) {
    console.log("[APP]", ...args);
}

ws.onopen = () => log("WebSocket connected");

ws.onmessage = async (message) => {
    const data = JSON.parse(message.data);
    log("WS message:", data);

    if (data.type === "initiator") {
        isInitiator = true;
        log("I am initiator");
        return;
    }

    if (data.type === "ready") {
        isReady = true;
        log("Both clients ready");

        if (!peer) {
            await createPeer();
        }

        if (started && isInitiator) {
            await createOffer();
        }
        return;
    }

    if (!peer) {
        log("Peer not created yet");
        return;
    }

    if (data.type === "offer") {
        log("Received offer");

        await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);

        ws.send(JSON.stringify({
            type: "answer",
            answer: answer
        }));

        log("Answer sent");
    }

    if (data.type === "answer") {
        log("Received answer");
        await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    if (data.type === "ice") {
        try {
            await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
            log("ICE candidate added");
        } catch (e) {
            log("Error adding ICE:", e);
        }
    }
};

async function createPeer() {
    peer = new RTCPeerConnection(configuration);

    peer.ontrack = (event) => {
        log("Remote track received");
        document.getElementById("remoteAudio").srcObject = event.streams[0];
    };

    peer.onicecandidate = (event) => {
        if (event.candidate) {
            ws.send(JSON.stringify({
                type: "ice",
                candidate: event.candidate
            }));
            log("Sent ICE candidate");
        }
    };

    peer.oniceconnectionstatechange = () => {
        log("ICE state:", peer.iceConnectionState);
    };

    peer.onconnectionstatechange = () => {
        log("Connection state:", peer.connectionState);
    };
}

async function createOffer() {
    log("Creating offer");
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    ws.send(JSON.stringify({
        type: "offer",
        offer: offer
    }));

    log("Offer sent");
}

document.getElementById("start").onclick = async () => {
    if (started) return;

    log("Start clicked");

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    await createPeer();

    localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
    });

    started = true;

    if (isReady && isInitiator) {
        await createOffer();
    }
};
</script>
</body>
</html>
