<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reliable Call</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1115;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #1a1d24;
    padding: 40px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    background: #2e7dff;
    color: white;
}
button:disabled {
    background: #555;
}
.status {
    margin: 15px 0;
    font-size: 14px;
    opacity: 0.85;
}
audio { display:none; }
</style>
</head>
<body>

<div class="card">
    <h2>🎙 Reliable Audio Call</h2>
    <div class="status" id="status">Connecting...</div>
    <button id="start" disabled>Start Call</button>
    <audio id="remoteAudio" autoplay playsinline></audio>
</div>

<script>
let ws;
let peer = null;
let localStream = null;

let isInitiator = false;
let isReady = false;
let started = false;
let bothStarted = false;

const statusEl = document.getElementById("status");
const startBtn = document.getElementById("start");
const remoteAudio = document.getElementById("remoteAudio");

function setStatus(s){
    statusEl.textContent = s;
    console.log("[STATUS]", s);
}

function connectWS(){
    const protocol = location.protocol === "https:" ? "wss://" : "ws://";
    ws = new WebSocket(protocol + location.host + "/ws");

    ws.onopen = () => setStatus("Waiting for second user...");

    ws.onclose = () => {
        setStatus("Reconnecting...");
        setTimeout(connectWS, 1000);
    };

    ws.onmessage = async (msg)=>{
        const data = JSON.parse(msg.data);

        if(data.type==="initiator") isInitiator = true;

        if(data.type==="ready"){
            isReady = true;
            startBtn.disabled = false;
            setStatus("Ready");
        }

        if(data.type==="both_started"){
            bothStarted = true;
            setStatus("Connecting peers...");
            if(isInitiator) await createOffer();
        }

        if(data.type==="offer"){
            await ensurePeer();
            await peer.setRemoteDescription(data.offer);
            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            ws.send(JSON.stringify({type:"answer",answer}));
        }

        if(data.type==="answer"){
            await peer.setRemoteDescription(data.answer);
        }

        if(data.type==="ice"){
            if(peer) await peer.addIceCandidate(data.candidate);
        }

        if(data.type==="peer_disconnected"){
            setStatus("Peer left");
            reset();
        }
    };
}

connectWS();

const config = {
  iceServers: [
    {
      urls: "stun:stun.relay.metered.ca:80",
    },
    {
      urls: "turn:global.relay.metered.ca:80",
      username: "63864b01e4a0797f25e621f0",
      credential: "cxnzOHJAAXJDNJtp",
    },
    {
      urls: "turn:global.relay.metered.ca:80?transport=tcp",
      username: "63864b01e4a0797f25e621f0",
      credential: "cxnzOHJAAXJDNJtp",
    },
    {
      urls: "turn:global.relay.metered.ca:443",
      username: "63864b01e4a0797f25e621f0",
      credential: "cxnzOHJAAXJDNJtp",
    },
    {
      urls: "turns:global.relay.metered.ca:443?transport=tcp",
      username: "63864b01e4a0797f25e621f0",
      credential: "cxnzOHJAAXJDNJtp",
    }
  ]
};

async function ensurePeer(){
    if(peer) return;
    peer = new RTCPeerConnection(config);

    peer.ontrack = e=>{
        remoteAudio.srcObject = e.streams[0];
        setStatus("Call active 🎧");
    };

    peer.onicecandidate = e=>{
        if(e.candidate){
            ws.send(JSON.stringify({type:"ice",candidate:e.candidate}));
        }
    };
}

async function createOffer(){
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);
    ws.send(JSON.stringify({type:"offer",offer}));
}

function reset(){
    if(peer){ peer.close(); peer=null; }
    if(localStream){
        localStream.getTracks().forEach(t=>t.stop());
        localStream=null;
    }
    started=false;
    bothStarted=false;
    startBtn.disabled=!isReady;
}

startBtn.onclick = async ()=>{
    if(started) return;

    started=true;
    startBtn.disabled=true;
    setStatus("Accessing microphone...");

    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    await ensurePeer();

    localStream.getTracks().forEach(t=>{
        peer.addTrack(t,localStream);
    });

    ws.send(JSON.stringify({type:"start"}));
    setStatus("Waiting for peer...");
};
</script>
</body>
</html>
